version: "3.9"

services:
  # ── Infrastructure ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: hiring_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hiring_copilot
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: hiring_redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Application ─────────────────────────────────────────────
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
      target: development
    container_name: hiring_api
    ports:
      - "8000:8000"
    volumes:
      - ./apps/api:/app
      - /app/.venv
    environment:
      ENVIRONMENT: development
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/hiring_copilot
      REDIS_URL: redis://redis:6379/0
      LOG_LEVEL: info
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  worker:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
      target: development
    container_name: hiring_worker
    volumes:
      - ./apps/api:/app
      - /app/.venv
    environment:
      ENVIRONMENT: development
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/hiring_copilot
      REDIS_URL: redis://redis:6379/0
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: python -m src.worker.main

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      target: development
    container_name: hiring_web
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web:/app
      - /app/node_modules
      - /app/.next
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_APP_NAME: AI Hiring Copilot
    env_file:
      - .env
    depends_on:
      - api
    command: pnpm dev

volumes:
  pgdata:
  redisdata:
